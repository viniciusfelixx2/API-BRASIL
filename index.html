<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Brasil Explorer</title>

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

  <div class="card">
    <h1>Brasil Explorer</h1>

    <form id="searchForm">
      <select id="tipoConsulta">
        <option value="cep">CEP</option>
        <option value="cnpj">CNPJ</option>
        <option value="bancos">Bancos</option>
      </select>

      <input id="inputBusca" placeholder="Digite aqui">

      <div class="buttons">
        <button type="submit">
          <i class="fa-solid fa-magnifying-glass"></i> Buscar
        </button>

        <button type="button" id="clearResults">
          <i class="fa-solid fa-eraser"></i> Limpar
        </button>

        <button type="button" id="clearHistory">
          <i class="fa-solid fa-trash-can"></i> Limpar Histórico
        </button>
      </div>
    </form>

    <div id="message"></div>
    <div id="resultArea"></div>
  </div>

  <div class="card">
    <h2>Histórico</h2>
    <div id="historyArea"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
