<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brasil Explorer - BrasilAPI</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="icon" type="image/png" href="./assets/logo.png">
</head>

<body>
  <div class="container">
    <div class="card">
      <span class="badge">Trabalho FATEC ITU - Tema Brasil API</span>
      <h1>Brasil Explorer</h1>
      <p class="subtitle">Aplicação feita pelos alunos Vinicius, Vitor e Genival.</p>

      <form id="searchForm" class="grid">
        <div>
          <label for="tipoConsulta">Tipo de consulta</label>
          <select id="tipoConsulta" required>
            <option value="cep">CEP</option>
            <option value="cnpj">CNPJ</option>
            <option value="bancos">Bancos</option>
          </select>
        </div>

        <div>
          <label for="inputBusca">Digite o valor</label>
          <input id="inputBusca" type="text" placeholder="Ex.: 01001000" required />
        </div>

        <div class="full actions">
          <button type="submit" class="btn-primary">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <span>Buscar</span>
          </button>
          <button type="button" id="clearResults" class="btn-secondary">
            <i class="fa-solid fa-eraser" aria-hidden="true"></i>
            <span>Limpar resultado atual</span>
          </button>
          <button type="button" id="clearHistory" class="btn-secondary">
            <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
            <span>Limpar histórico</span>
          </button>
        </div>
      </form>

      <div id="message" class="message"></div>
      <div id="resultArea"></div>
    </div>

    <div class="card">
      <h2>Histórico salvo no localStorage</h2>
      <p class="subtitle">Cada consulta é armazenada localmente e pode ser removida individualmente.</p>
      <div id="historyArea"></div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
