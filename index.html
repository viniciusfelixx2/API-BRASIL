<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brasil Explorer - BrasilAPI</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8cx9nEnS0VKVF1+W+d3g9RBG8+7rhlg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" type="image/png" href="./assets/logo.png">
</head>

<body>
  <div class="container">
    <div class="card">
      <span class="badge">Trabalho FATEC ITU - Tema Brasil API</span>
      <h1>Brasil Explorer</h1>
      <p class="subtitle">Aplicação feita pelos alunos Vinicius, Vitor e Genival.</p>

      <form id="searchForm" class="grid">
        <div>
          <label for="tipoConsulta">Tipo de consulta</label>

          <div class="custom-select" id="customSelect">
            <button type="button" class="custom-select-trigger" id="selectTrigger">
              <span id="selectedText">📮 CEP</span>
              <span class="arrow"><i class="fa-solid fa-chevron-down"></i></span>
            </button>

            <div class="custom-options" id="customOptions">
              <div class="custom-option selected" data-value="cep">📮 CEP</div>
              <div class="custom-option" data-value="cnpj">🏢 CNPJ</div>
              <div class="custom-option" data-value="bancos">🏦 Bancos</div>
            </div>
          </div>

          <input type="hidden" id="tipoConsulta" value="cep" required />
        </div>

        <div>
          <label for="inputBusca">Digite o valor</label>
          <input id="inputBusca" type="text" placeholder="Ex.: 01001000" required />
        </div>

        <div class="full actions">
          <button type="submit" class="btn-primary">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <span>Buscar</span>
          </button>
          <button type="button" id="clearResults" class="btn-secondary">
            <i class="fa-solid fa-eraser" aria-hidden="true"></i>
            <span>Limpar resultado atual</span>
          </button>
          <button type="button" id="clearHistory" class="btn-secondary">
            <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
            <span>Limpar histórico</span>
          </button>
        </div>
      </form>

      <div id="message" class="message"></div>
      <div id="resultArea"></div>
    </div>

    <div class="card">
      <h2>Histórico salvo no localStorage</h2>
      <p class="subtitle">Cada consulta é armazenada localmente e pode ser removida individualmente.</p>
      <div id="historyArea"></div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
